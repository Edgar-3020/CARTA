<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Para Fhri 💌</title>

  <!-- Fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: "Poppins", system-ui, sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg, #f6f0ff, #fef6f7, #f0fbff);
      overflow:hidden;
    }

    /* ===== PARTÍCULAS FLOTANTES ===== */
    .particles{
      position:fixed;
      inset:0;
      z-index:0;
      pointer-events:none;
      overflow:hidden;
    }

    .particle{
      position:absolute;
      width:10px;
      height:10px;
      border-radius:50%;
      opacity:0.35;
      filter: blur(0.3px);
      animation: floatUp linear infinite;
    }

    @keyframes floatUp{
      0%{
        transform: translateY(120vh) scale(0.6);
        opacity:0;
      }
      15%{
        opacity:0.35;
      }
      100%{
        transform: translateY(-30vh) scale(1.1);
        opacity:0;
      }
    }

    .container{
      width:min(420px, 92vw);
      height:min(520px, 90vh);
      display:flex;
      justify-content:center;
      align-items:center;
      position:relative;
      z-index:2;
    }

    /* ===== SOBRE ===== */
    .envelope{
      width:100%;
      height:280px;
      position:relative;
      cursor:pointer;
      transition: transform 0.5s ease;
      border-radius:18px;
      display:flex;
      justify-content:center;
      align-items:center;
      filter: drop-shadow(0px 12px 25px rgba(0,0,0,0.12));
    }

    .shake{
      animation: shake 0.55s ease;
    }

    @keyframes shake {
      0% { transform: translateX(0px) rotate(0deg); }
      15% { transform: translateX(-6px) rotate(-1deg); }
      30% { transform: translateX(6px) rotate(1deg); }
      45% { transform: translateX(-5px) rotate(-1deg); }
      60% { transform: translateX(5px) rotate(1deg); }
      75% { transform: translateX(-3px) rotate(-0.5deg); }
      100% { transform: translateX(0px) rotate(0deg); }
    }

    .envelope:hover{
      transform: scale(1.02);
    }

    .envelope-base{
      position:absolute;
      inset:0;
      background: linear-gradient(180deg, #fff6fb, #f0f7ff);
      border-radius:18px;
      border:1px solid rgba(255, 182, 193, 0.4);
      overflow:hidden;
    }

    .envelope-flap{
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:60%;
      background: linear-gradient(135deg, #ffe5f2, #e8f2ff);
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      transform-origin: top;
      transition: transform 1.2s ease;
      z-index:3;
      border-top-left-radius:18px;
      border-top-right-radius:18px;
    }

    .envelope-front{
      position:absolute;
      bottom:0;
      left:0;
      width:100%;
      height:70%;
      background: linear-gradient(135deg, #fce7f3, #dbeafe);
      clip-path: polygon(0 100%, 50% 0, 100% 100%, 100% 100%, 0 100%);
      z-index:4;
    }

    .envelope-text{
      position:relative;
      z-index:5;
      text-align:center;
      padding:20px;
      color:#444;
      font-weight:600;
      font-size:16px;
      line-height:1.5;
      text-shadow: 0px 1px 4px rgba(0,0,0,0.15);
    }

    .envelope-text span{
      display:block;
      font-weight:500;
      font-size:14px;
      margin-top:6px;
      opacity:0.9;
    }

    /* ===== CARTA ===== */
    .letter-wrapper{
      position:absolute;
      width:100%;
      height:100%;
      display:flex;
      justify-content:center;
      align-items:center;
      opacity:0;
      pointer-events:none;
      transition: opacity 0.6s ease;
      z-index:10;
    }

    .letter{
      width:95%;
      max-width:400px;
      height:480px;
      background: #ffffff;
      border-radius:18px;
      box-shadow: 0px 14px 40px rgba(0,0,0,0.18);
      position:relative;
      overflow:hidden;
      transform: scale(0.8);
      transition: transform 0.9s ease;
      border:1px solid rgba(0,0,0,0.08);
    }

    .fold-top{
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:33%;
      background: linear-gradient(180deg, #ffffff, #f8f8f8);
      transform-origin: top;
      transform: rotateX(90deg);
      transition: transform 1.4s ease;
      z-index:3;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }

    .fold-middle{
      position:absolute;
      top:33%;
      left:0;
      width:100%;
      height:34%;
      background: #ffffff;
      border-top: 1px solid rgba(0,0,0,0.06);
      border-bottom: 1px solid rgba(0,0,0,0.06);
      z-index:2;
    }

    .fold-bottom{
      position:absolute;
      bottom:0;
      left:0;
      width:100%;
      height:33%;
      background: linear-gradient(0deg, #ffffff, #f8f8f8);
      transform-origin: bottom;
      transform: rotateX(90deg);
      transition: transform 1.4s ease;
      z-index:3;
      border-top: 1px solid rgba(0,0,0,0.06);
    }

    .letter-content{
      position:absolute;
      inset:0;
      padding:35px 25px;
      z-index:5;
      display:flex;
      flex-direction:column;
      gap:18px;
      opacity:0;
      transition: opacity 1s ease;
    }

    .letter-title{
      font-size:34px;
      font-weight:700;
      text-align:center;
      font-family: "Dancing Script", cursive;

      background: linear-gradient(90deg, #ff6aa2, #6aa8ff);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;

      text-shadow: 0px 2px 6px rgba(0,0,0,0.25);
    }

    .letter-text{
      font-size:20px;
      line-height:1.7;
      font-family: "Dancing Script", cursive;
      font-weight:600;
      color:#222;
      position:relative;
      white-space:pre-line;
    }

    /* letras animadas */
    .char{
      display:inline-block;
      opacity:0;
      transform: translateX(18px);
      animation: charIn 0.35s ease forwards;
    }

    @keyframes charIn{
      to{
        opacity:1;
        transform: translateX(0px);
      }
    }

    .signature{
      margin-top:auto;
      text-align:right;
      font-weight:700;
      font-size:22px;
      font-family: "Dancing Script", cursive;

      background: linear-gradient(90deg, #ff7bb4, #7bb6ff);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;

      text-shadow: 0px 2px 6px rgba(0,0,0,0.22);
    }

    /* ===== ABIERTO ===== */
    .opened .envelope-flap{
      transform: rotateX(180deg);
    }

    .opened .letter-wrapper{
      opacity:1;
      pointer-events:auto;
    }

    .opened .letter{
      transform: scale(1);
    }

    .opened .fold-top{
      transform: rotateX(0deg);
    }

    .opened .fold-bottom{
      transform: rotateX(0deg);
    }

    .opened .letter-content{
      opacity:1;
    }

    /* ===== CORAZONES TE AMO ===== */
    .love-banner{
      position:absolute;
      top:-35px;
      left:50%;
      transform: translateX(-50%);
      display:flex;
      gap:12px;
      z-index:99;
      pointer-events:none;
      opacity:0;
      transition: opacity 1s ease;
    }

    .love-banner.show{
      opacity:1;
    }

    .love-heart{
      width:58px;
      height:58px;
      background: rgba(255, 105, 180, 0.9);
      transform: rotate(45deg);
      border-radius:12px;
      display:flex;
      justify-content:center;
      align-items:center;
      position:relative;
      box-shadow: 0px 10px 20px rgba(0,0,0,0.15);
      animation: popIn 0.6s ease forwards;
    }

    .love-heart::before,
    .love-heart::after{
      content:"";
      position:absolute;
      width:58px;
      height:58px;
      background: inherit;
      border-radius:50%;
    }

    .love-heart::before{
      top:-29px;
      left:0;
    }

    .love-heart::after{
      left:-29px;
      top:0;
    }

    .love-letter{
      transform: rotate(-45deg);
      font-weight:900;
      font-size:22px;
      color:white;
      text-shadow: 0px 2px 6px rgba(0,0,0,0.35);
      font-family: "Poppins", sans-serif;
    }

    @keyframes popIn{
      0%{
        transform: rotate(45deg) scale(0.2);
        opacity:0;
      }
      70%{
        transform: rotate(45deg) scale(1.12);
        opacity:1;
      }
      100%{
        transform: rotate(45deg) scale(1);
        opacity:1;
      }
    }

    @media(max-width:420px){
      .letter{
        height:520px;
      }
      .letter-title{
        font-size:30px;
      }
      .letter-text{
        font-size:18px;
      }
      .love-heart{
        width:48px;
        height:48px;
      }
      .love-heart::before,
      .love-heart::after{
        width:48px;
        height:48px;
      }
      .love-heart::before{
        top:-24px;
      }
      .love-heart::after{
        left:-24px;
      }
      .love-letter{
        font-size:18px;
      }
    }
  </style>
</head>

<body>

  <!-- partículas -->
  <div class="particles" id="particles"></div>

  <div class="container" id="scene">

    <div class="envelope" id="envelope">
      <div class="envelope-base"></div>
      <div class="envelope-flap"></div>
      <div class="envelope-front"></div>

      <div class="envelope-text">
        Para: <b>Fhri</b>, el amor de mi vida 💖
        <span>De: <b>ichi</b></span>
        <span style="margin-top:12px; font-size:13px; opacity:0.75;">
          (Click para abrir)
        </span>
      </div>
    </div>

    <div class="letter-wrapper">
      <div class="letter" id="letterCard">

        <div class="love-banner" id="loveBanner"></div>

        <div class="fold-top"></div>
        <div class="fold-middle"></div>
        <div class="fold-bottom"></div>

        <div class="letter-content">
          <div class="letter-title">Mi amor</div>

          <div class="letter-text" id="letterText"></div>

          <div class="signature">
            Con amor,<br>
            ichi 💙💗
          </div>
        </div>

      </div>
    </div>

  </div>

<script>
  const scene = document.getElementById("scene");
  const envelope = document.getElementById("envelope");
  const loveBanner = document.getElementById("loveBanner");
  const letterTextElement = document.getElementById("letterText");
  const particlesContainer = document.getElementById("particles");

  let opened = false;

  // TEXTO ORIGINAL (puedes cambiarlo aquí)
  const letterText = `
Hola bebé, se lo mucho que te gustan las cartas, pero se que achocas todas en una cajita,
esata vez estoy haciendo algo especial, no tomé ideas de nada porque me fuans amorcito
estoy siendo original, quiero inicar disculpándome, creo que estos días, o más bien estas semanas 
no te he tratado como un pedacito de mi corazón, es decir, no te he cuidado, ni te he hecho sentir amada
de la forma que tú sientes amor, y quiero disculparme por eso amor mío, no soy perfecto lo sé, estoy muy
lejos de ser el hombre que muchas veces sueñas, pero intento día con día poder serlo, cometo errores y muchos.
Pero te agreadezco que llegaste a mi vida y apartir de ese punto todo cambió, mis días son más bonitos,
encontré mi futuro y mi paz (a veces porque tu dices que no tendremos paz jijijij). Pero quiero que sepas mi amor
que eres muy importante y valiosa para mi, que te admiro, te respeto y te elijo cada día. y lo haré SIEMPRE.
No eres un estorbo para mi, no eres menos importante para mi, pero me abrumo y no logro expresarme de la mejor manera.
También me disculpo por todo eso, sé que no te lo mereces y me das la prueba de amor más grande, que sabiendo como soy
te quedas a mi lado, me apoyas y me regañas LOL que triste, pero se que es porque vez las cosas de otro punto de vista
cosas que yo no puedo percibir y te agradezco mi amor, quiero que te quedes a mi lado para siempre, que seamos uno siempre.
Se que lo que escribo suena lindo pero realmente no quiero que se quede aquí, quiero demostrártelo y que veas ese cambio en mi.
Y que me sigas elijiendo todos los días.
Gracias por existir, por ser tú, por quedarte hasta el final mi amor. Eres mi lugar seguro. TE AMO X100000000000^10000000000
`;

  // ===== PARTICULAS =====
  function createParticles(){
    const colors = ["#ff9acb", "#9acbff", "#d7b3ff", "#fff0a6", "#b5ffcc"];

    for(let i=0; i<26; i++){
      const p = document.createElement("div");
      p.classList.add("particle");

      const size = Math.random() * 10 + 6;
      p.style.width = size + "px";
      p.style.height = size + "px";

      p.style.left = Math.random() * 100 + "%";
      p.style.animationDuration = (Math.random() * 10 + 10) + "s";
      p.style.animationDelay = (Math.random() * 8) + "s";

      p.style.background = colors[Math.floor(Math.random() * colors.length)];

      particlesContainer.appendChild(p);
    }
  }

  createParticles();

  // ===== SACUDIDA AUTOMATICA =====
  const shakeInterval = setInterval(() => {
    if(opened) return;
    envelope.classList.add("shake");
    setTimeout(() => envelope.classList.remove("shake"), 600);
  }, 4500);

  envelope.addEventListener("click", () => {
    if(opened) return;
    opened = true;

    clearInterval(shakeInterval);

    scene.classList.add("opened");

    // Iniciar animación del texto letra por letra
    setTimeout(() => {
      animateText(letterText);
    }, 1300);

    // A los 5 segundos mostrar TE AMO
    setTimeout(() => {
      showLoveWord("TE AMO");
    }, 5000);
  });

  // ===== ANIMACION LETRA POR LETRA =====
  function animateText(text){
    letterTextElement.innerHTML = "";
    let delay = 0;

    for(let i=0; i<text.length; i++){
      const ch = text[i];

      if(ch === "\n"){
        const br = document.createElement("br");
        letterTextElement.appendChild(br);
        continue;
      }

      const span = document.createElement("span");
      span.classList.add("char");

      // si es espacio
      span.textContent = ch === " " ? "\u00A0" : ch;

      span.style.animationDelay = (delay * 0.03) + "s";
      letterTextElement.appendChild(span);

      delay++;
    }
  }

  // ===== TE AMO EN CORAZONES =====
  function showLoveWord(word){
    loveBanner.innerHTML = "";
    const letters = word.split("");
    let delay = 0;

    letters.forEach((char) => {
      setTimeout(() => {
        if(char === " "){
          const spacer = document.createElement("div");
          spacer.style.width = "22px";
          loveBanner.appendChild(spacer);
          return;
        }

        const heart = document.createElement("div");
        heart.classList.add("love-heart");

        const heartColors = [
          "rgba(255,105,180,0.92)",
          "rgba(135,206,250,0.92)",
          "rgba(186,85,211,0.92)",
          "rgba(255,182,193,0.92)"
        ];

        heart.style.background = heartColors[Math.floor(Math.random() * heartColors.length)];

        const letter = document.createElement("div");
        letter.classList.add("love-letter");
        letter.textContent = char;

        heart.appendChild(letter);
        loveBanner.appendChild(heart);

      }, delay);

      delay += 500;
    });

    loveBanner.classList.add("show");
  }
</script>

</body>
</html>
